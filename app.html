<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Scorecard — Taylor Wilkinson</title>
  <style>
    /* ── Reset ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0d1f0d 0%, #1a3a1a 100%);
      min-height: 100vh;
      color: #2c3e2d;
    }

    /* ── Nav ── */
    .top-nav {
      background-color: #0d1f0d;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .top-nav a {
      color: #a8d5a2;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .top-nav a:hover { color: #f0e68c; }
    .top-nav .brand { color: #f0e68c; margin-right: auto; font-size: 1rem; }

    /* ── App Container ── */
    .app-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    /* ── Header ── */
    .app-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .app-header h1 {
      font-size: 2.4rem;
      color: #f0e68c;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 6px;
    }
    .app-header p {
      color: #a8d5a2;
      font-size: 1rem;
    }

    /* ── Course Setup ── */
    .setup-card {
      background: #f5f5f0;
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .setup-card h2 {
      color: #1a3a1a;
      font-size: 1.2rem;
      margin-bottom: 18px;
      border-bottom: 3px solid #4a7c59;
      padding-bottom: 8px;
    }
    .setup-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .setup-row label {
      font-size: 0.88rem;
      font-weight: bold;
      color: #1a3a1a;
      display: block;
      margin-bottom: 5px;
    }
    .setup-row input, .setup-row select {
      padding: 9px 14px;
      border: 2px solid #a8d5a2;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      color: #2c3e2d;
      outline: none;
      transition: border 0.2s;
    }
    .setup-row input:focus, .setup-row select:focus {
      border-color: #4a7c59;
    }
    .setup-row input[type="text"] { width: 200px; }
    .setup-row input[type="number"] { width: 90px; }

    .btn-start {
      background-color: #4a7c59;
      color: white;
      border: none;
      padding: 11px 30px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 20px;
    }
    .btn-start:hover { background-color: #2d5a2d; }

    /* ── Scorecard ── */
    .scorecard-card {
      background: #f5f5f0;
      border-radius: 14px;
      padding: 28px 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      display: none;
    }
    .scorecard-card h2 {
      color: #1a3a1a;
      font-size: 1.2rem;
      margin-bottom: 18px;
      border-bottom: 3px solid #4a7c59;
      padding-bottom: 8px;
    }

    /* Scorecard Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      font-size: 0.92rem;
    }
    th {
      background-color: #1a3a1a;
      color: #f0e68c;
      padding: 10px 8px;
      text-align: center;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
    }
    td {
      text-align: center;
      padding: 6px 4px;
      border-bottom: 1px solid #d0d8d0;
    }
    tr:nth-child(even) td { background-color: #eef3ee; }

    .hole-num {
      font-weight: bold;
      color: #1a3a1a;
      background-color: #d8ecd8 !important;
    }
    .par-cell {
      color: #4a7c59;
      font-weight: 600;
    }
    .score-input {
      width: 52px;
      padding: 6px 4px;
      border: 2px solid #a8d5a2;
      border-radius: 6px;
      text-align: center;
      font-size: 1rem;
      font-weight: bold;
      color: #1a3a1a;
      background: white;
      outline: none;
      transition: border 0.2s;
    }
    .score-input:focus { border-color: #4a7c59; }

    /* Score coloring */
    .eagle  { background-color: #ffd700 !important; color: #000 !important; border-radius: 50%; }
    .birdie { background-color: #4ecdc4 !important; color: #fff !important; border-radius: 50%; }
    .par-score { background-color: #eef3ee; }
    .bogey  { background-color: #ffb3b3 !important; color: #800 !important; }
    .double { background-color: #ff6b6b !important; color: #fff !important; }

    /* Summary */
    .summary-bar {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 12px;
      background: #1a3a1a;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 20px;
    }
    .summary-item {
      text-align: center;
    }
    .summary-item .label {
      font-size: 0.75rem;
      color: #a8d5a2;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .summary-item .value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #f0e68c;
    }
    .summary-item .value.under { color: #4ecdc4; }
    .summary-item .value.over  { color: #ff6b6b; }
    .summary-item .value.even  { color: #f0e68c; }

    /* Legend */
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      font-size: 0.82rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-calc {
      background-color: #4a7c59;
      color: white;
      border: none;
      padding: 11px 28px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-calc:hover { background-color: #2d5a2d; }
    .btn-reset {
      background-color: transparent;
      color: #4a7c59;
      border: 2px solid #4a7c59;
      padding: 9px 26px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { background-color: #4a7c59; color: white; }

    /* Result message */
    #result-msg {
      margin-top: 20px;
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: bold;
      text-align: center;
      display: none;
    }
    .msg-under { background-color: #d0f0ee; color: #1a5c58; border: 2px solid #4ecdc4; }
    .msg-over  { background-color: #ffe0e0; color: #800; border: 2px solid #ff6b6b; }
    .msg-even  { background-color: #fff8cc; color: #5a4a00; border: 2px solid #f0e68c; }

    /* Nine hole separator */
    .nine-separator td {
      background-color: #1a3a1a !important;
      color: #f0e68c;
      font-weight: bold;
      font-size: 0.85rem;
      padding: 6px;
    }
  </style>
</head>

<body>

  <div class="top-nav">
    <span class="brand">Taylor Wilkinson</span>
    <a href="index.html">Home</a>
    <a href="resume.html">Resume</a>
    <a href="scratch.html">Golf Page</a>
  </div>

  <div class="app-container">

    <div class="app-header">
      <h1>⛳ Golf Scorecard</h1>
      <p>Track your round hole by hole — see your score vs. par in real time</p>
    </div>

    <!-- Setup Card -->
    <div class="setup-card" id="setup-card">
      <h2>Start a New Round</h2>
      <div class="setup-row">
        <div>
          <label for="player-name">Player Name</label>
          <input type="text" id="player-name" placeholder="Taylor Wilkinson" value="Taylor Wilkinson">
        </div>
        <div>
          <label for="course-name">Course Name</label>
          <input type="text" id="course-name" placeholder="Thanksgiving Point">
        </div>
        <div>
          <label for="num-holes">Holes</label>
          <select id="num-holes">
            <option value="9">9 Holes</option>
            <option value="18" selected>18 Holes</option>
          </select>
        </div>
      </div>
      <button class="btn-start" onclick="startRound()">⛳ Start Round</button>
    </div>

    <!-- Scorecard Card -->
    <div class="scorecard-card" id="scorecard-card">
      <h2 id="scorecard-title">Scorecard</h2>

      <!-- Legend -->
      <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background:#ffd700;"></span> Eagle (−2)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4ecdc4;"></span> Birdie (−1)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#eef3ee; border:1px solid #ccc;"></span> Par (E)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ffb3b3;"></span> Bogey (+1)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ff6b6b;"></span> Double+ (+2)</div>
      </div>

      <!-- Summary -->
      <div class="summary-bar">
        <div class="summary-item">
          <div class="label">Player</div>
          <div class="value" id="sum-player" style="font-size:1rem;">—</div>
        </div>
        <div class="summary-item">
          <div class="label">Total Score</div>
          <div class="value" id="sum-score">—</div>
        </div>
        <div class="summary-item">
          <div class="label">vs. Par</div>
          <div class="value" id="sum-vs-par">—</div>
        </div>
        <div class="summary-item">
          <div class="label">Holes Played</div>
          <div class="value" id="sum-holes">0</div>
        </div>
        <div class="summary-item">
          <div class="label">Best Hole</div>
          <div class="value" id="sum-best">—</div>
        </div>
      </div>

      <!-- Table -->
      <table id="scorecard-table">
        <thead>
          <tr id="header-row">
            <th>Hole</th>
            <th>Par</th>
            <th>Score</th>
            <th>+/−</th>
          </tr>
        </thead>
        <tbody id="scorecard-body"></tbody>
      </table>

      <div class="btn-row">
        <button class="btn-calc" onclick="calculateScore()">📊 Calculate Score</button>
        <button class="btn-reset" onclick="resetRound()">↩ New Round</button>
      </div>

      <div id="result-msg"></div>
    </div>

  </div>

  <script>
    // Standard par values for 18 holes
    const standardPars = [4,4,3,5,4,3,4,5,4, 4,3,5,4,4,3,5,4,4];

    let numHoles = 18;

    function startRound() {
      numHoles = parseInt(document.getElementById('num-holes').value);
      const player = document.getElementById('player-name').value || 'Player';
      const course = document.getElementById('course-name').value || 'Local Course';

      document.getElementById('scorecard-title').textContent =
        `${player} — ${course}`;
      document.getElementById('sum-player').textContent = player;

      buildScorecard(numHoles);
      document.getElementById('setup-card').style.display = 'none';
      document.getElementById('scorecard-card').style.display = 'block';
    }

    function buildScorecard(holes) {
      const tbody = document.getElementById('scorecard-body');
      tbody.innerHTML = '';

      for (let i = 0; i < holes; i++) {
        // Front/back nine separator
        if (holes === 18 && i === 9) {
          const sep = document.createElement('tr');
          sep.className = 'nine-separator';
          sep.innerHTML = `<td colspan="4">— Back Nine —</td>`;
          tbody.appendChild(sep);
        }
        if (holes === 18 && i === 0) {
          const sep = document.createElement('tr');
          sep.className = 'nine-separator';
          sep.innerHTML = `<td colspan="4">— Front Nine —</td>`;
          tbody.appendChild(sep);
        }

        const par = standardPars[i] || 4;
        const tr = document.createElement('tr');
        tr.id = `row-${i}`;
        tr.innerHTML = `
          <td class="hole-num">${i + 1}</td>
          <td class="par-cell">${par}</td>
          <td>
            <input
              type="number"
              class="score-input"
              id="score-${i}"
              min="1"
              max="15"
              placeholder="—"
              oninput="liveUpdate(${i}, ${par})"
            >
          </td>
          <td id="diff-${i}">—</td>
        `;
        tbody.appendChild(tr);
      }
    }

    function liveUpdate(holeIndex, par) {
      const input = document.getElementById(`score-${holeIndex}`);
      const diffCell = document.getElementById(`diff-${holeIndex}`);
      const scoreInput = document.getElementById(`score-${holeIndex}`);
      const val = parseInt(input.value);

      // Clear previous color classes
      scoreInput.className = 'score-input';

      if (isNaN(val) || val < 1) {
        diffCell.textContent = '—';
        return;
      }

      const diff = val - par;
      diffCell.textContent = diff === 0 ? 'E' : (diff > 0 ? `+${diff}` : `${diff}`);

      // Color the input
      if (diff <= -2)      scoreInput.classList.add('eagle');
      else if (diff === -1) scoreInput.classList.add('birdie');
      else if (diff === 0)  scoreInput.classList.add('par-score');
      else if (diff === 1)  scoreInput.classList.add('bogey');
      else                  scoreInput.classList.add('double');

      // Live running totals
      calculateScore(true);
    }

    function calculateScore(silent = false) {
      let totalScore = 0;
      let totalPar = 0;
      let holesPlayed = 0;
      let bestDiff = Infinity;
      let bestHole = null;

      for (let i = 0; i < numHoles; i++) {
        const par = standardPars[i] || 4;
        const val = parseInt(document.getElementById(`score-${i}`).value);
        totalPar += par;
        if (!isNaN(val) && val > 0) {
          totalScore += val;
          holesPlayed++;
          const diff = val - par;
          if (diff < bestDiff) { bestDiff = diff; bestHole = i + 1; }
        }
      }

      const vsPar = totalScore - totalPar + (numHoles - holesPlayed) * 0; // only played holes
      const playedPar = Array.from({length: holesPlayed}, (_,i) => standardPars[i] || 4)
                             .reduce((a,b) => a+b, 0);
      const vsParPlayed = holesPlayed > 0 ? totalScore - playedPar : 0;

      document.getElementById('sum-score').textContent = holesPlayed > 0 ? totalScore : '—';
      document.getElementById('sum-holes').textContent = holesPlayed;
      document.getElementById('sum-best').textContent = bestHole ? `Hole ${bestHole}` : '—';

      const vsEl = document.getElementById('sum-vs-par');
      if (holesPlayed > 0) {
        vsEl.textContent = vsParPlayed === 0 ? 'E' : (vsParPlayed > 0 ? `+${vsParPlayed}` : `${vsParPlayed}`);
        vsEl.className = 'value ' + (vsParPlayed < 0 ? 'under' : vsParPlayed > 0 ? 'over' : 'even');
      } else {
        vsEl.textContent = '—';
        vsEl.className = 'value';
      }

      if (!silent && holesPlayed > 0) {
        showResult(totalScore, vsParPlayed, holesPlayed);
      }
    }

    function showResult(total, vsPar, holesPlayed) {
      const msg = document.getElementById('result-msg');
      msg.style.display = 'block';

      const complete = holesPlayed === numHoles;
      let text = complete
        ? `🏁 Round complete! `
        : `📊 After ${holesPlayed} of ${numHoles} holes — `;

      if (vsPar < 0)      { text += `${total} strokes, ${Math.abs(vsPar)} under par. 🔥 Fantastic round!`; msg.className = 'msg-under'; }
      else if (vsPar > 0) { text += `${total} strokes, ${vsPar} over par. Keep grinding! 💪`; msg.className = 'msg-over'; }
      else                 { text += `${total} strokes, even par. Solid round! ⛳`; msg.className = 'msg-even'; }

      msg.textContent = text;
    }

    function resetRound() {
      document.getElementById('setup-card').style.display = 'block';
      document.getElementById('scorecard-card').style.display = 'none';
      document.getElementById('result-msg').style.display = 'none';
      document.getElementById('course-name').value = '';
    }
  </script>

</body>
</html>
